# 小易助手 - 简化版 Docker Compose 配置
# 适合云服务器轻量部署，使用内置 H2 数据库
version: '3.8'

services:
  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiaoyi-assistant
    environment:
      # 设置你的 AI API Key
      - QWEN_API_KEY=${QWEN_API_KEY}
      # JVM 内存参数（根据服务器配置调整）
      - JAVA_OPTS=-Xms256m -Xmx1g -XX:+UseG1GC
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据
      - xiaoyi-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

# 数据卷
volumes:
  xiaoyi-data:
