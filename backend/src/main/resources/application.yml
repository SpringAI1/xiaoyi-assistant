server:
  port: 8080

spring:
  application:
    name: enterprise-knowledge-system

  datasource:
    url: jdbc:h2:file:./data/knowledge_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring.redis:
  host: localhost
  port: 6379
  password:
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 0

logging:
  level:
    root: INFO
    com.enterprise.knowledge: DEBUG
    dev.langchain4j: WARN

knowledge:
  rag:
    chunk-size: 500
    chunk-overlap: 100
    similarity-threshold: 0.75
    max-results: 5
    enable-hybrid-search: true
    enable-query-expansion: true
    enable-reranking: true
  agent:
    max-tool-calls: 5
    response-timeout: 30
    enable-orchestration: true
  vector:
    dimensions: 512
    similarity-metric: COS
  memory:
    max-history-size: 50
    max-memory-size: 20

langchain:
  chat:
    provider: qwen
  embeddings:
    provider: local

  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-turbo
    temperature: 0.7
    top-p: 1.0

weather:
  api-key:
  base-url: https://api.openweathermap.org/data/2.5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html